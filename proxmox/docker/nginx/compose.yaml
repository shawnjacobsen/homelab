services:
  tailscale:
    image: tailscale/tailscale:latest
    env_file: .env
    networks:
      - homelab_shared_net
    ports:
      # NPM admin UI: exposes :81 (inside this netns) on the LAN at 10.0.0.30:81.
      # It remains reachable on the tailnet at cloud...ts.net:81 and via npm.tail.shawnjacobsen.com.
      - "81:81"
    dns:
      - 127.0.0.11       # Docker embedded DNS (required for container name resolution)
      - 192.168.1.1      # Local ipv4 gateway
      - 1.1.1.1          # Cloudflare DNS backup
      - 8.8.8.8          # Google DNS backup
    environment:
      TS_HOSTNAME: ${TS_HOSTNAME} # Enter the hostname for your tailnet
#     Commenting out auth key after initial oauth connection to prevent duplicate devices generated every container restart
#     TS_AUTH_KEY: ${TS_AUTH_KEY}?ephemeral=false # OAuth client key recommended
      TS_EXTRA_ARGS: ${TS_EXTRA_ARGS} # Tags are required when using OAuth client
      TS_PERMIT_CERT_UID: caddy
      TS_STATE_DIR: /var/lib/tailscale
    init: true
    restart: unless-stopped
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - type: volume
        source: tailscale
        target: /var/lib/tailscale
      - type: volume
        source: tailscale_sock
        target: /tmp # Mounting the entire /tmp folder to access tailscale.sock
    cap_add:
      - NET_ADMIN
      - NET_RAW
  nginx_proxy_manager:
    image: "jc21/nginx-proxy-manager:latest"
    container_name: nginx_proxy_manager
    restart: unless-stopped
    network_mode: service:tailscale
    volumes:
      - ./data/npm_data:/data
      - ./data/npm_letsencrypt:/etc/letsencrypt
      - ./data/npm_logs:/var/log/nginx  
    environment:
      DB_SQLITE_FILE: "/data/database.sqlite" # Using SQLite instead of MySQL for simplicity
      INITIAL_ADMIN_EMAIL: shawn.jacobsen0@gmail.com
      INITIAL_ADMIN_PASSWORD: changeme

  goaccess:
    image: justsky/goaccess-for-nginxproxymanager:latest
    container_name: goaccess
    restart: unless-stopped
    environment:
        - TZ=America/Denver
        #- SKIP_ARCHIVED_LOGS=False #optional   
        #- BASIC_AUTH=False #optional
        #- BASIC_AUTH_USERNAME=user #optional
        #- BASIC_AUTH_PASSWORD=pass #optional                
    ports:
        - '7880:7880'
    volumes:
        - ./data/npm_data/logs:/opt/log
        # - ./data/npm_data/logs/proxy-host-1_access.log:/opt/log/proxy-host-1_access.log
    networks:
      - homelab_shared_net

networks:
  homelab_shared_net:
    name: homelab_shared_net
    driver: bridge

volumes:
  tailscale:
    name: tailscale
  tailscale_sock:
    name: tailscale_sock
