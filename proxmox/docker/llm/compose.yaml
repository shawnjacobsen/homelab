services:
  ollama:
    # GPU passthrough is disabled for this LXC (GPU dedicated to Windows 11 VM, see 101.conf).
    # Re-enable `runtime: nvidia` + NVIDIA_VISIBLE_DEVICES once passthrough is restored; until
    # then the nvidia prestart hook fails and Ollama runs CPU-only (slow inference).
    # runtime: nvidia
    environment:
      # The ollama image bakes in NVIDIA_VISIBLE_DEVICES=all, which triggers the nvidia
      # prestart hook and fails without GPU. Force it to `void` to disable the hook (CPU-only).
      # When GPU passthrough is restored, set this back to `0` and re-enable runtime: nvidia.
      - NVIDIA_VISIBLE_DEVICES=void
      - OLLAMA_DEBUG=1
    volumes:
      - ollama:/root/.ollama
    ports:
      - 11434:11434
    container_name: ollama
    image: ollama/ollama
    restart: always
    networks:
      - ai-net

  open-webui:
    ports:
      - 7000:8080
    volumes:
      - open-webui:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - ENABLE_RAG_WEB_SEARCH=true
      - RAG_WEB_SEARCH_ENGINE=searxng
      - RAG_WEB_SEARCH_RESULT_COUNT=3
      - RAG_WEB_SEARCH_CONCURRENT_REQUESTS=10
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>
    container_name: open-webui
    restart: always
    image: ghcr.io/open-webui/open-webui:latest
    networks:
      - ai-net
      - homelab_shared_net

  redis:
    container_name: redis
    image: valkey/valkey:7-alpine
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    volumes:
      - valkey-data2:/data
    cap_drop: [ALL]
    cap_add: [SETGID, SETUID, DAC_OVERRIDE]
    logging:
      driver: json-file
      options:
        max-size: 4m
        max-file: "1"
    networks:
      - ai-net

  searxng:
    container_name: searxng
    image: searxng/searxng:latest
    restart: unless-stopped
    ports:
      - 7777:8080
    volumes:
      - ./searxng/img:/usr/local/searxng/searx/static/themes/simple/img:rw
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://${SEARXNG_HOSTNAME:-localhost}/
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID]
    logging:
      driver: json-file
      options:
        max-size: 4m
        max-file: "1"
    networks:
      - ai-net

  tika:
    ports:
      - 9998:9998
    image: apache/tika:latest-full
    restart: always
    networks:
      - ai-net

volumes:
  ollama:
  open-webui:
  valkey-data2:

networks:
  ai-net:
  homelab_shared_net:
    external: true
